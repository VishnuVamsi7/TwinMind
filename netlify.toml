# Netlify reads this from the repo root. The Next.js app lives in `frontend/`.
# https://docs.netlify.com/build/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  command = "npm run build"
  # Relative to `base` (see Netlify docs). Required so publish ≠ base; otherwise
  # @netlify/plugin-nextjs errors: "publish directory cannot be the same as the base directory".
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
