# Netlify file-based config for this Next.js app.
# In the Netlify UI, set the site base directory to `frontend` when the repo root is the TwinMind monorepo.
# https://docs.netlify.com/build/configure-builds/file-based-configuration/
# Next.js on Netlify: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"
  # Do not set `publish` here — @netlify/plugin-nextjs / OpenNext sets the correct output.

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
